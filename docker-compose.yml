# University Portal Docker Compose
# Supports British/Nigerian, American, and Polytechnic systems

version: '3.8'

services:
  # PostgreSQL with pgvector for AI
  postgres:
    image: pgvector/pgvector:pg16
    container_name: university_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-university_portal}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: university_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Centrifugo for real-time notifications
  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: university_centrifugo
    ports:
      - "8000:8000"
    environment:
      CENTRIFUGO_SECRET: ${CENTRIFUGO_SECRET:-secret-key-change-in-production}
      CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET:-admin-secret}
    volumes:
      - centrifugo_data:/centrifugo/data
    command: centrifugo --config=/etc/centrifugo/config.json

  # Django Ninja API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: university_api
    ports:
      - "8001:8001"
    environment:
      # Database
      DB_NAME: ${DB_NAME:-university_portal}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Centrifugo
      CENTRIFUGO_URL: http://centrifugo:8000
      CENTRIFUGO_SECRET: ${CENTRIFUGO_SECRET:-secret-key-change-in-production}
      
      # Security
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-in-production}
      DEBUG: ${DEBUG:-True}
      
      # University Configuration
      ACADEMIC_STYLE: ${ACADEMIC_STYLE:-british_nigerian}
      SYSTEM_TYPE: ${SYSTEM_TYPE:-university}
      UNIVERSITY_NAME: ${UNIVERSITY_NAME:-University of Nigeria}
      UNIVERSITY_SHORT: ${UNIVERSITY_SHORT:-UNN}
      
      # Payment Gateways
      REMITA_KEY: ${REMITA_KEY:-}
      PAYSTACK_SECRET: ${PAYSTACK_SECRET:-}
      FLUTTERWAVE_SECRET: ${FLUTTERWAVE_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      centrifugo:
        condition: service_started
    volumes:
      - ./apps/api:/app
    command: python manage.py runserver 0.0.0.0:8001

  # Next.js Web Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: university_web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8001
      NEXT_PUBLIC_CENTRIFUGO_URL: ws://centrifugo:8000
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules

  # Expo Mobile App (build only)
  mobile:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile
    container_name: university_mobile
    environment:
      EXPO_PUBLIC_API_URL: http://api:8001
    volumes:
      - ./apps/mobile:/app
      - /app/node_modules
      - /app/.expo

  # ML Service (Litestar)
  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    container_name: university_ml
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-university_portal}
      MODEL_PATH: /models
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ml_models:/models

  # Celery Worker
  celery:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: university_celery
    command: celery -A api worker -l info
    environment:
      DB_NAME: ${DB_NAME:-university_portal}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - postgres
    volumes:
      - ./apps/api:/app

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: university_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - web
      - api
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  centrifugo_data:
  ml_models:
  nginx_certs:

networks:
  default:
    name: university_network